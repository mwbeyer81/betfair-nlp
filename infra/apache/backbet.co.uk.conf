# Apache virtual host config for backbet.co.uk
# Placed at /etc/apache2/sites-available/backbet.co.uk.conf by setup.sh

# HTTP — redirect everything to HTTPS
<VirtualHost *:80>
    ServerName backbet.co.uk
    ServerAlias www.backbet.co.uk

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# HTTPS — SSL termination + reverse proxy to Node.js on port 3000
<VirtualHost *:443>
    ServerName backbet.co.uk
    ServerAlias www.backbet.co.uk

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/backbet.co.uk/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/backbet.co.uk/privkey.pem
    Include               /etc/letsencrypt/options-ssl-apache.conf

    # Reverse proxy to Express app
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]

    # Forwarded headers so Express sees the real client IP and protocol
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"
    RequestHeader set X-Real-IP         "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "SAMEORIGIN"
    Header always set X-XSS-Protection          "1; mode=block"

    ErrorLog  ${APACHE_LOG_DIR}/backbet_error.log
    CustomLog ${APACHE_LOG_DIR}/backbet_access.log combined
</VirtualHost>
